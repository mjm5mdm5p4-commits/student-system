<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d2671,#c33764);
}

.box{
    background:white;
    width:340px;
    padding:25px;
    border-radius:12px;
}

h2{
    text-align:center;
    color:#1d2671;
}

input, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#1d2671;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#c33764;
}

</style>
</head>

<body>

<div class="box">

<h2>Student Registration</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="matric" placeholder="Matric Number">
<input type="password" id="password" placeholder="Password">

<select id="dept">
<option value="">Select Department</option>
<option>Computer Science</option>
<option>Engineering</option>
<option>Business Administration</option>
<option>Mass Communication</option>
</select>

<select id="level">
<option value="">Select Level</option>
<option>100</option>
<option>200</option>
<option>300</option>
<option>400</option>
</select>

<button onclick="register()">Register</button>

</div>

<script>

function register(){

    let name = document.getElementById("name").value;
    let matric = document.getElementById("matric").value;
    let password = document.getElementById("password").value;
    let dept = document.getElementById("dept").value;
    let level = document.getElementById("level").value;

    // validation
    if(name === "" || matric === "" || password === "" || dept === "" || level === ""){
        alert("Please fill all fields");
        return;
    }
console.log("Saving data...");

localStorage.setItem("name", name);
localStorage.setItem("matric", matric);
localStorage.setItem("password", password);

console.log("Saved matric:", localStorage.getItem("matric"));
console.log("Saved password:", localStorage.getItem("password"));
    // SAVE DATA (VERY IMPORTANT)
    localStorage.setItem("name", name);
    localStorage.setItem("matric", matric);
    localStorage.setItem("password", password);
    localStorage.setItem("dept", dept);
    localStorage.setItem("level", level);

    localStorage.setItem("registered", "yes");

    alert("Registration Successful!");

    // go to login page
    window.location.href = "index.html";
}

</script>

</body>
</html>
