<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
}

.form{
    background:white;
    padding:20px;
    margin-top:50px;
    width:300px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

/* Popup */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<div class="form">
<h2>Register</h2>

<input id="dept" placeholder="Department">
<input id="level" placeholder="Level">

<button onclick="submit()">Submit</button>
</div>

<div class="popup" id="popup">
<div class="popup-content">
<h3>✅ Registration Successful</h3>
<button onclick="go()">Continue</button>
</div>
</div>

<script>
function submit(){
    localStorage.setItem("registered","yes");

    document.getElementById("popup").style.display="flex";
}

function go(){
    window.location.href="dashboard.html";
}
</script>

</body>
</html>
