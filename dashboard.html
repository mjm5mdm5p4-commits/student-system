<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Portal Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef2f7;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#1d2671;
    position:fixed;
    padding:20px;
    color:white;
}

.sidebar h2{
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#c33764;
}

/* Main */
.main{
    margin-left:240px;
    padding:20px;
}

/* Header */
.header{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* Cards */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card h3{
    margin-top:0;
    color:#1d2671;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>Student Portal</h2>

<a href="dashboard.html">Dashboard</a>
<a href="register.html">Register</a>
<a href="courses.html">Courses</a>
<a href="index.html">Logout</a>
</div>

<!-- Main Content -->
<div class="main">

<!-- Header -->
<div class="header">
<h2>Welcome 👋 <span id="name"></span></h2>

<p><b>Matric Number:</b> <span id="matric"></span></p>
</div>

<!-- Cards -->
<div class="grid">

<div class="card">
<h3>Department</h3>
<p id="dept">Not Set</p>
</div>

<div class="card">
<h3>Level</h3>
<p id="level">Not Set</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">Checking...</p>
</div>

<div class="card">
<h3>Registered Courses</h3>
<p id="courses">No courses selected</p>
</div>

</div>

</div>

<script>

/* Student info */
document.getElementById("name").innerText =
localStorage.getItem("name");

document.getElementById("matric").innerText =
localStorage.getItem("matric");

document.getElementById("dept").innerText =
localStorage.getItem("dept");

document.getElementById("level").innerText =
localStorage.getItem("level");

/* Registration status */
if(localStorage.getItem("registered") === "yes"){
    document.getElementById("status").innerText =
    "Registered ✔";
}else{
    document.getElementById("status").innerText =
    "Not Registered";
}

/* Courses */
let courses = JSON.parse(localStorage.getItem("courses"));

if(courses && courses.length > 0){
    document.getElementById("courses").innerText =
    courses.join(", ");
}else{
    document.getElementById("courses").innerText =
    "No courses selected";
}

</script>

</body>
</html>
