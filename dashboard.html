<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
}

/* Sidebar */

.sidebar{
    width:220px;
    height:100vh;
    background:#1d2671;
    position:fixed;
    padding:20px;
    color:white;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#c33764;
}

/* Main Content */

.main{
    margin-left:240px;
    padding:20px;
}

.main h1{
    color:#1d2671;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:10px;
    color:#1d2671;
}

button{
    padding:12px 20px;
    border:none;
    background:#1d2671;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#c33764;
}

/* Mobile */

@media(max-width:768px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

.main{
    margin-left:0;
}

}

</style>
</head>

<body>

<div class="sidebar">

<h2>Student Portal</h2>

<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="course.html">Courses</a>

</div>

<div class="main">

<h1>Welcome Student</h1>

<div class="card">

<h3>Student Information</h3>

<p><strong>Name:</strong> John Doe</p>
<p><strong>Matric Number:</strong> CSC/2025/001</p>
<p><strong>Department:</strong> Computer Science</p>
<p><strong>Level:</strong> 100 Level</p>

</div>

<div class="card">

<h3>Quick Actions</h3>

<a href="course.html">
<button>Select Courses</button>
</a>

</div>

</div>

</body>
</html>
