<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6fb;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#1d2671;
    position:fixed;
    color:white;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:10px 0;
}

.main{
    margin-left:240px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Portal</h2>
<a href="dashboard.html">Dashboard</a>
<a href="course.html">Courses</a>
<a href="results.html">Results</a>
<a href="index.html" onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>Student Dashboard</h1>

<div class="card" id="profile"></div>

<div class="card">
<h3>Selected Courses</h3>
<div id="courses"></div>
</div>

</div>

<script>

let student = JSON.parse(localStorage.getItem("student"));

if(!student){
    window.location.href = "index.html";
}

document.getElementById("profile").innerHTML = `
<h3>Student Profile</h3>
<p><b>Name:</b> ${student.name}</p>
<p><b>Matric:</b> ${student.matric}</p>
<p><b>Department:</b> ${student.dept}</p>
<p><b>Level:</b> ${student.level}</p>
`;

let courses = JSON.parse(localStorage.getItem("courses")) || [];

let box = document.getElementById("courses");

if(courses.length === 0){
    box.innerHTML = "No courses selected";
}else{
    courses.forEach(c=>{
        let div = document.createElement("div");
        div.innerText = c;
        div.style.padding="8px";
        div.style.background="#1d2671";
        div.style.color="white";
        div.style.margin="5px";
        div.style.display="inline-block";
        div.style.borderRadius="6px";
        box.appendChild(div);
    });
}

function logout(){
    localStorage.removeItem("student");
}

</script>

</body>
</html>
