<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Bikeh Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f7fb;
    padding:20px;
}

/* HEADER */
h2{
    text-align:center;
    color:#1b5e20;
    margin-bottom:10px;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
}

/* CARDS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.card h3{
    margin:0;
    color:#1b5e20;
}

.card p{
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

/* ORDERS LIST */
.orders{
    margin-top:25px;
}

.order{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

.status{
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    color:white;
    background:#ff9800;
    display:inline-block;
}

.status.delivered{
    background:#1b5e20;
}

/* BACK BUTTON */
a{
    display:inline-block;
    margin-bottom:15px;
    text-decoration:none;
    background:#1b5e20;
    color:white;
    padding:10px 15px;
    border-radius:10px;
}

</style>
</head>

<body>

<h2>📊 BIKEH DASHBOARD</h2>

<div class="container">

<a href="admin.html">⬅ Back to Admin</a>

<div class="grid">

    <div class="card">
        <h3>Total Orders</h3>
        <p id="totalOrders">0</p>
    </div>

    <div class="card">
        <h3>Total Revenue</h3>
        <p id="totalRevenue">₦0</p>
    </div>

    <div class="card">
        <h3>Pending Orders</h3>
        <p id="pendingOrders">0</p>
    </div>

    <div class="card">
        <h3>Delivered Orders</h3>
        <p id="deliveredOrders">0</p>
    </div>

</div>

<div class="orders">

    <h3 style="margin-top:30px;">📦 Recent Orders</h3>

    <div id="ordersList"></div>

</div>

</div>

<script>

/* LOAD ORDERS */
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let totalOrders = orders.length;
let totalRevenue = 0;
let pending = 0;
let delivered = 0;

orders.forEach(o=>{
    totalRevenue += o.total;

    if(o.status === "Delivered"){
        delivered++;
    } else {
        pending++;
    }
});

/* UPDATE UI */
document.getElementById("totalOrders").innerText = totalOrders;
document.getElementById("totalRevenue").innerText = "₦" + totalRevenue;
document.getElementById("pendingOrders").innerText = pending;
document.getElementById("deliveredOrders").innerText = delivered;

/* SHOW RECENT ORDERS */
let box = document.getElementById("ordersList");

if(orders.length === 0){
    box.innerHTML = "<p>No orders yet 📦</p>";
}

orders.slice().reverse().forEach((o,i)=>{

    box.innerHTML += `
    <div class="order">
        <b>Order #${i+1}</b><br>
        💰 ₦${o.total}<br>
        📅 ${o.date}<br>
        <span class="status ${o.status === 'Delivered' ? 'delivered' : ''}">
            ${o.status}
        </span>
    </div>
    `;
});

</script>

</body>
</html>
