<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#1d2671;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
    padding:10px;
    border-radius:5px;
}

.sidebar a:hover{
    background:#c33764;
}

.main{
    margin-left:240px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.btn{
    padding:10px;
    background:#1d2671;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Portal</h2>

<a href="dashboard.html">Dashboard</a>
<a href="register.html">Register</a>
<a href="courses.html">Courses</a>
<a href="index.html">Logout</a>
</div>

<div class="main">

<h2>Welcome 👋 <span id="name"></span></h2>
<p>Matric: <span id="matric"></span></p>

<div class="grid">

<div class="card">
<h3>Profile</h3>
<p>Student Account Active</p>
</div>

<div class="card">
<h3>Courses</h3>
<p>View registered courses</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">Not Registered</p>
</div>

</div>

</div>

<script>
document.getElementById("matric").innerText = localStorage.getItem("matric");
document.getElementById("name").innerText = localStorage.getItem("name");

if(localStorage.getItem("registered") === "yes"){
    document.getElementById("status").innerText = "Registered ✔";
}
</script>

</body>
</html>
