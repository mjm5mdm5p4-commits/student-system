<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Results & GPA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial;
    background:#eef2f7;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
    color:#1d2671;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#1d2671;
    color:white;
}

select{
    padding:8px;
    width:80px;
}

button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    background:#1d2671;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#c33764;
}

.gpa-box{
    text-align:center;
    font-size:28px;
    color:#c33764;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>📚 Result Checker</h2>

<table>

<tr>
<th>Course</th>
<th>Grade</th>
</tr>

<tr>
<td>CSC101</td>
<td>
<select class="grade">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>F</option>
</select>
</td>
</tr>

<tr>
<td>MTH101</td>
<td>
<select class="grade">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>F</option>
</select>
</td>
</tr>

<tr>
<td>GST101</td>
<td>
<select class="grade">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>F</option>
</select>
</td>
</tr>

<tr>
<td>PHY101</td>
<td>
<select class="grade">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>F</option>
</select>
</td>
</tr>

</table>

<button onclick="calculateGPA()">
Calculate GPA
</button>

</div>

<div class="card">

<h2>🎯 GPA Result</h2>

<div class="gpa-box" id="gpa">
0.00
</div>

</div>

<div class="card">

<button onclick="backDashboard()">
⬅ Back To Dashboard
</button>

</div>

</div>

<script>

function calculateGPA(){

    let grades =
    document.querySelectorAll(".grade");

    let total = 0;

    grades.forEach(function(item){

        let value = item.value;

        if(value === "A"){
            total += 5;
        }

        else if(value === "B"){
            total += 4;
        }

        else if(value === "C"){
            total += 3;
        }

        else if(value === "D"){
            total += 2;
        }

        else{
            total += 0;
        }

    });

    let gpa =
    (total / grades.length).toFixed(2);

    document.getElementById("gpa").innerText =
    gpa;

}

function backDashboard(){

    window.location.href =
    "dashboard.html";

}

</script>

</body>
</html>
