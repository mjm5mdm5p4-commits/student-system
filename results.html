<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Results</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial;
    background:#eef2f7;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
    color:#1d2671;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#1d2671;
    color:white;
}

.gpa{
    font-size:30px;
    text-align:center;
    font-weight:bold;
    color:#c33764;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#1d2671;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#c33764;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>📊 Student Result Sheet</h2>

<table>
<tr>
<th>Course</th>
<th>Grade</th>
<th>Point</th>
</tr>

<tr>
<td>CSC101</td>
<td>A</td>
<td>5</td>
</tr>

<tr>
<td>MTH101</td>
<td>B</td>
<td>4</td>
</tr>

<tr>
<td>GST101</td>
<td>C</td>
<td>3</td>
</tr>

<tr>
<td>PHY101</td>
<td>B</td>
<td>4</td>
</tr>

</table>

</div>

<div class="card">
<h2>🎯 CGPA</h2>
<div class="gpa" id="gpa">0.00</div>
</div>

<div class="card">
<button onclick="back()">
⬅ Back to Dashboard
</button>
</div>

</div>

<script>

let grades = [
    {course:"CSC101", point:5},
    {course:"MTH101", point:4},
    {course:"GST101", point:3},
    {course:"PHY101", point:4}
];

let total = 0;

grades.forEach(g => {
    total += g.point;
});

let cgpa = (total / grades.length).toFixed(2);

document.getElementById("gpa").innerText = cgpa;

function back(){
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
