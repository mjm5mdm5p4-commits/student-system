
<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
    font-family:Arial;
    background:#f4f6fb;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:red;
    color:white;
    border:none;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
}

.checkout{
    background:#1b5e20;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    margin-top:20px;
    border-radius:8px;
    font-size:16px;
}

.total{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
}
</style>
</head>

<body>

<h2>Your Cart 🛒</h2>

<div id="cart"></div>

<h3 id="total"></h3>

<!-- CHECKOUT FORM -->
<h3>Checkout Details</h3>

<input id="name" placeholder="Your Name">
<input id="address" placeholder="Delivery Address">
<input id="phone" placeholder="Phone Number">

<button class="checkout" onclick="sendToWhatsApp()">
    Place Order on WhatsApp 📲
</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let adminWhatsApp = "2349033350425";

let deliveryFee = 2000;

let box = document.getElementById("cart");

function render(){

    box.innerHTML = "";
    let total = 0;

    cart.forEach((item, i)=>{

        total += item.price * item.qty;

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <span>${item.name} (x${item.qty}) - ₦${item.price * item.qty}</span>
            <button onclick="removeItem(${i})">Remove</button>
        `;

        box.appendChild(div);
    });

    document.getElementById("total").innerText = "Subtotal: ₦" + total;
}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    render();
}

function sendToWhatsApp(){

    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let phone = document.getElementById("phone").value;

    let message = "Hello Admin, I want to order:%0A%0A";

    let total = 0;

    cart.forEach(item => {
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        message += "- " + item.name + " x" + item.qty + " (₦" + itemTotal + ")%0A";
    });

    total += deliveryFee;

    message += "%0ADelivery Fee: ₦" + deliveryFee;
    message += "%0ATotal: ₦" + total;

    message += "%0A%0AName: " + name;
    message += "%0AAddress: " + address;
    message += "%0APhone: " + phone;

    let url = "https://wa.me/" + adminWhatsApp + "?text=" + message;

    window.open(url, "_blank");
}

render();

</script>

</body>
</html>
