<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body{
    font-family:Arial;
    background:#f5f7fb;
    padding:20px;
    margin:0;
}

/* HEADER */
h2{
    text-align:center;
    color:#1b5e20;
}

/* CART BOX */
.box{
    max-width:600px;
    margin:auto;
}

/* CARD */
.item{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* NAME */
.item h3{
    margin:0;
}

/* PRICE */
.price{
    color:#1b5e20;
    font-weight:bold;
}

/* QTY CONTROLS */
.controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:10px;
}

/* BUTTONS */
button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.add{
    background:#1b5e20;
    color:white;
}

.remove{
    background:#d32f2f;
    color:white;
}

/* TOTAL */
.total{
    font-size:20px;
    font-weight:bold;
    text-align:center;
    margin-top:20px;
    color:#1b5e20;
}

/* CHECKOUT */
.checkout{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:linear-gradient(135deg,#1b5e20,#43a047);
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

</style>
</head>

<body>

<h2>🛒 Your Cart</h2>

<div class="box" id="cartBox"></div>

<div class="total" id="total"></div>

<button class="checkout" onclick="goCheckout()">
Proceed to Checkout 📲
</button>

<script src="store.js"></script>

<script>

function renderCart(){

    let box = document.getElementById("cartBox");
    box.innerHTML = "";

    let total = 0;

    if(cart.length === 0){
        box.innerHTML = "<p style='text-align:center'>Cart is empty 🛒</p>";
        document.getElementById("total").innerText = "";
        return;
    }

    cart.forEach((item, index)=>{

        let qty = item.qty || 1;
        let sub = item.price * qty;

        total += sub;

        box.innerHTML += `
        <div class="item">
            <h3>${item.name}</h3>
            <p class="price">₦${item.price} × ${qty} = ₦${sub}</p>

            <div class="controls">

                <button class="remove" onclick="decrease(${index})">-</button>

                <span><b>${qty}</b></span>

                <button class="add" onclick="increase(${index})">+</button>

                <button class="remove" onclick="removeItem(${index})">Remove</button>

            </div>
        </div>
        `;
    });

    document.getElementById("total").innerText = "Total: ₦" + total;

    saveCart();
}

/* + INCREASE */
function increase(i){
    cart[i].qty += 1;
    renderCart();
}

/* - DECREASE */
function decrease(i){
    cart[i].qty -= 1;

    if(cart[i].qty <= 0){
        cart.splice(i,1);
    }

    renderCart();
}

/* REMOVE */
function removeItem(i){
    cart.splice(i,1);
    renderCart();
}

/* CHECKOUT */
function goCheckout(){
    window.location.href = "checkout.html";
}

renderCart();

</script>

</body>
</html>
