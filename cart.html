<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body{
    font-family:Arial;
    background:#f5f7fb;
    margin:0;
    padding:15px;
}

/* HEADER */
h2{
    text-align:center;
    color:#1b5e20;
}

/* CART BOX */
.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* BUTTON */
button{
    background:#e53935;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

/* TOTAL */
.total{
    font-size:20px;
    font-weight:bold;
    text-align:center;
    margin-top:20px;
    color:#1b5e20;
}

/* CHECKOUT BUTTON */
.checkout{
    display:block;
    text-align:center;
    background:#1b5e20;
    color:white;
    padding:12px;
    margin-top:20px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.checkout:hover{
    background:#2e7d32;
}

.empty{
    text-align:center;
    color:#777;
    margin-top:30px;
}

</style>
</head>

<body>

<h2>🛒 Your Cart</h2>

<div id="cartBox"></div>

<div class="total" id="total"></div>

<a class="checkout" href="checkout.html">Proceed to Checkout</a>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let box = document.getElementById("cartBox");
let total = 0;

function renderCart(){

    box.innerHTML = "";
    total = 0;

    if(cart.length === 0){
        box.innerHTML = "<p class='empty'>Your cart is empty 🛒</p>";
        document.getElementById("total").innerText = "";
        return;
    }

    cart.forEach((item, i)=>{
        total += item.price * (item.qty || 1);

        box.innerHTML += `
        <div class="card">
            <div>
                <b>${item.name}</b><br>
                ₦${item.price} × ${item.qty || 1}
            </div>

            <button onclick="removeItem(${i})">Remove</button>
        </div>
        `;
    });

    document.getElementById("total").innerText = "Total: ₦" + total;
}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

renderCart();

</script>

</body>
</html>
