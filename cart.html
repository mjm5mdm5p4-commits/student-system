<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
    font-family:Arial;
    background:#f4f6fb;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:red;
    color:white;
    border:none;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
}

.total{
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}

.checkout{
    background:#1b5e20;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    margin-top:20px;
    border-radius:8px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>Your Cart 🛒</h2>

<div id="cart"></div>

<h3 id="total"></h3>

<button class="checkout" onclick="sendToWhatsApp()">
    Place Order on WhatsApp 📲
</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let adminWhatsApp = "2349033350425";

let box = document.getElementById("cart");

function render(){

    box.innerHTML = "";
    let total = 0;

    cart.forEach((item, i)=>{
        total += item.price;

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <span>${item.name} - ₦${item.price}</span>
            <button onclick="removeItem(${i})">Remove</button>
        `;

        box.appendChild(div);
    });

    document.getElementById("total").innerText = "Total: ₦" + total;
}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    render();
}
function sendToWhatsApp(){

    let adminWhatsApp = "2349033350425";

    let message = "Hello Admin, I want to order:\n\n";

    cart.forEach(item => {
        message += "- " + item.name + " (₦" + item.price + ")\n";
    });

    let total = cart.reduce((sum, item) => sum + item.price, 0);

    message += "\nTotal: ₦" + total;

    let url = "https://wa.me/" + adminWhatsApp + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}


render();

</script>

</body>
</html>
