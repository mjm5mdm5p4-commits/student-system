
<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
    font-family:Arial;
    background:#f4f6fb;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

button{
    background:red;
    color:white;
    border:none;
    padding:8px;
    border-radius:6px;
}

.total{
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Your Cart 🛒</h2>

<div id="cart"></div>

<h3 id="total"></h3>

<a href="checkout.html">Proceed to Checkout</a>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let box = document.getElementById("cart");
let total = 0;

function render(){

    box.innerHTML = "";
    total = 0;

    cart.forEach((item, i)=>{
        total += item.price;

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            ${item.name} - ₦${item.price}
            <button onclick="removeItem(${i})">Remove</button>
        `;

        box.appendChild(div);
    });

    document.getElementById("total").innerText = "Total: ₦" + total;
}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    render();
}

render();

</script>

</body>
</html>
