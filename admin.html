<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
    font-family:Arial;
    background:#f4f6fb;
    padding:20px;
}

.box{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#1b5e20;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<script>

const adminPassword = "Hamzat2026@";
const enteredPassword = prompt("Enter Admin Password");

if (enteredPassword !== adminPassword) {

    document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
            background:#111;
            color:white;
            font-size:35px;
        ">
            Access Denied ❌
        </div>
    `;

    throw new Error("Access Denied");

<div class="box">

<h2>Admin Panel 🌿</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>

<script src="store.js"></script>

<script>

function addProduct(){

    let newP = {
        id: Date.now(),
        name: document.getElementById("name").value,
        price: Number(document.getElementById("price").value),
        image: document.getElementById("image").value || "https://via.placeholder.com/150"
    };

    products.push(newP);

    saveProducts();

    alert("Product Added Successfully ✅");

}

</script>

</body>
</html>
