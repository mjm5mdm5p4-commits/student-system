<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
    font-family:Arial;
    background:#f4f6fb;
    padding:20px;
}

.box{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#1b5e20;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#1b5e20;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN PROTECTION -->
<script>
if(localStorage.getItem("adminAuth") !== "true"){
    window.location.href = "admin-login.html";
}
</script>

<div class="box">
<a href="admin-dashboard.html" style="
    display:block;
    text-align:center;
    margin-top:15px;
    padding:10px;
    background:#1b5e20;
    color:white;
    text-decoration:none;
    border-radius:6px;
">
View Dashboard 📊
</a>
<h2>Admin Panel 🌿</h2>

<!-- LOGOUT -->
<button onclick="logout()" style="background:red;margin-bottom:10px;">
Logout
</button>

<!-- LINK TO ORDERS -->
<a href="admin-orders.html">View Orders 📦</a>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>

<script src="store.js"></script>

<script>

function addProduct(){

    let newP = {
        id: Date.now(),
        name: document.getElementById("name").value,
        price: Number(document.getElementById("price").value),
        image: document.getElementById("image").value || "https://via.placeholder.com/150"
    };

    products.push(newP);
    saveProducts();

    alert("Product Added Successfully ✅");
}

function logout(){
    localStorage.removeItem("adminAuth");
    window.location.href = "admin-login.html";
}

</script>

</body>
</html>
