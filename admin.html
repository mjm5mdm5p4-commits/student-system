<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.box{max-width:500px;margin:auto;background:white;padding:20px;border-radius:10px;}
input{width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:12px;background:#1b5e20;color:white;border:none;}
</style>
</head>

<body>

<div class="box">

<h2>Admin Panel 🌿</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>

<script src="store.js"></script>

<script>

function addProduct(){

    let newP = {
        id: Date.now(),
        name: document.getElementById("name").value,
        price: Number(document.getElementById("price").value),
        image: document.getElementById("image").value || "https://via.placeholder.com/150"
    };

    products.push(newP);
    saveProducts();

    alert("Product Added!");
}

</script>

</body>
</html>
