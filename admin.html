<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#f5f7fb;
}

/* LOGIN BOX */
.box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

/* TITLE */
h2{
    color:#1b5e20;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:linear-gradient(135deg,#1b5e20,#43a047);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* ADMIN AREA */
#adminArea{
    display:none;
    max-width:900px;
    margin:20px auto;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:20px;
}

/* CARD */
.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.card h3{
    margin:0;
    color:#1b5e20;
}

.card p{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

/* ORDER CARD */
.orderCard{
    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.orderCard h3{
    color:#1b5e20;
    margin-top:0;
}

.orderCard p{
    margin:5px 0;
}

.items{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid #ddd;
}

/* EMPTY */
.empty{
    text-align:center;
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">

    <h2>🔐 Admin Login</h2>

    <input type="password" id="pass" placeholder="Enter Password">

    <button onclick="login()">Login</button>

</div>

<!-- ADMIN AREA -->
<div id="adminArea">

    <h2 style="text-align:center;">📦 Admin Dashboard</h2>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <div class="card">
            <h3>Total Orders</h3>
            <p id="totalOrders">0</p>
        </div>

        <div class="card">
            <h3>Total Revenue</h3>
            <p id="totalRevenue">₦0</p>
        </div>

    </div>

    <button onclick="loadOrders()">View Orders</button>

    <div id="ordersBox"></div>

</div>

<script>

/* LOGIN */
function login(){

    let pass = document.getElementById("pass").value;

    if(pass === "Bikeh2025"){

        document.getElementById("loginBox").style.display = "none";

        document.getElementById("adminArea").style.display = "block";

        loadDashboard();

    } else {

        alert("Wrong password ❌");

    }
}

/* DASHBOARD */
function loadDashboard(){

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    document.getElementById("totalOrders").innerText = orders.length;

    let revenue = 0;

    orders.forEach(order=>{
        revenue += Number(order.total || 0);
    });

    document.getElementById("totalRevenue").innerText = "₦" + revenue;
}

/* LOAD ORDERS */
function loadOrders(){

    let box = document.getElementById("ordersBox");

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    box.innerHTML = "";

    if(orders.length === 0){

        box.innerHTML = `
        <div class="empty">
            <h3>No orders yet ❌</h3>
        </div>
        `;

        return;
    }

    orders.reverse().forEach((order, i)=>{

        box.innerHTML += `
        <div class="orderCard">

            <h3>Order #${i + 1}</h3>

            <p><b>Status:</b> ${order.status || "Pending"}</p>

            <p><b>Total:</b> ₦${order.total || 0}</p>

            <p><b>Date:</b> ${order.date || "No date"}</p>

            <div class="items">

                <b>Items:</b><br><br>

                ${
                    (order.items || []).map(item => `
                        • ${item.name} × ${item.qty || 1}<br>
                    `).join("")
                }

            </div>

        </div>
        `;
    });
}

</script>

</body>
</html>
