
<!DOCTYPE html>
<html>
<head>
<title>Bikeh Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#f5f7fb;
}

/* LOGIN BOX */
.box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

/* TITLES */
h2{
    color:#1b5e20;
}

/* INPUTS */
input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
    font-size:15px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:linear-gradient(135deg,#1b5e20,#43a047);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* ADMIN AREA */
#adminArea{
    display:none;
    max-width:1000px;
    margin:20px auto;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:20px;
}

/* CARD */
.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.card h3{
    margin:0;
    color:#1b5e20;
}

.card p{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

/* SECTIONS */
.section{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* ORDER CARD */
.orderCard{
    background:#fff;
    padding:15px;
    margin-top:15px;
    border-radius:12px;
    border:1px solid #ddd;
}

.orderCard h3{
    margin-top:0;
    color:#1b5e20;
}

/* PRODUCT LIST */
.productList{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid #ddd;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">

    <h2>🔐 Admin Login</h2>

    <input type="password" id="pass" placeholder="Enter Password">

    <button onclick="login()">Login</button>

</div>

<!-- ADMIN AREA -->
<div id="adminArea">

    <h2 style="text-align:center;">📦 Bikeh Admin Dashboard</h2>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <div class="card">
            <h3>Total Orders</h3>
            <p id="totalOrders">0</p>
        </div>

        <div class="card">
            <h3>Total Revenue</h3>
            <p id="totalRevenue">₦0</p>
        </div>

        <div class="card">
            <h3>Total Products</h3>
            <p id="totalProducts">0</p>
        </div>

    </div>

    <!-- ADD PRODUCT -->
    <div class="section">

        <h2>➕ Add Product</h2>

        <input type="text" id="pname" placeholder="Product Name">

        <input type="number" id="pprice" placeholder="Product Price">

        <input type="text" id="pimage" placeholder="Product Image URL">

        <textarea id="pdesc" placeholder="Product Description"></textarea>

        <button onclick="addProduct()">
            Add Product
        </button>

    </div>

    <!-- VIEW ORDERS -->
    <div class="section">

        <h2>📦 Orders</h2>

        <button onclick="loadOrders()">
            View Orders
        </button>

        <div id="ordersBox"></div>

    </div>

</div>

<script>

/* LOGIN */
function login(){

    let pass = document.getElementById("pass").value;

    if(pass === "Bikeh2025"){

        document.getElementById("loginBox").style.display = "none";

        document.getElementById("adminArea").style.display = "block";

        loadDashboard();

    } else {

        alert("Wrong password ❌");

    }
}

/* DASHBOARD */
function loadDashboard(){

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    let products = JSON.parse(localStorage.getItem("products")) || [];

    document.getElementById("totalOrders").innerText =
        orders.length;

    document.getElementById("totalProducts").innerText =
        products.length;

    let revenue = 0;

    orders.forEach(order=>{
        revenue += Number(order.total || 0);
    });

    document.getElementById("totalRevenue").innerText =
        "₦" + revenue;
}

/* ADD PRODUCT */
function addProduct(){

    let name = document.getElementById("pname").value;

    let price = document.getElementById("pprice").value;

    let image = document.getElementById("pimage").value;

    let desc = document.getElementById("pdesc").value;

    if(!name || !price){

        alert("Fill product name and price");

        return;
    }

    let products =
        JSON.parse(localStorage.getItem("products")) || [];

    let newProduct = {

        id: Date.now(),

        name:name,

        price:Number(price),

        image:image,

        description:desc

    };

    products.push(newProduct);

    localStorage.setItem(
        "products",
        JSON.stringify(products)
    );

    alert("Product Added ✅");

    document.getElementById("pname").value = "";
    document.getElementById("pprice").value = "";
    document.getElementById("pimage").value = "";
    document.getElementById("pdesc").value = "";

    loadDashboard();
}

/* LOAD ORDERS */
function loadOrders(){

    let box = document.getElementById("ordersBox");

    let orders =
        JSON.parse(localStorage.getItem("orders")) || [];

    box.innerHTML = "";

    if(orders.length === 0){

        box.innerHTML = `
        <p>No orders yet ❌</p>
        `;

        return;
    }

    orders.reverse().forEach((order, i)=>{

        box.innerHTML += `
        <div class="orderCard">

            <h3>Order #${i + 1}</h3>

            <p><b>Status:</b>
            ${order.status || "Pending"}</p>

            <p><b>Total:</b>
            ₦${order.total || 0}</p>

            <p><b>Date:</b>
            ${order.date || "No date"}</p>

            <div class="productList">

                <b>Products:</b><br><br>

                ${
                    (order.items || []).map(item => `
                        • ${item.name}
                        × ${item.qty || 1}<br>
                    `).join("")
                }

            </div>

        </div>
        `;
    });
}

</script>

</body>
</html>
