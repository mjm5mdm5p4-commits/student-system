<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f5f7fb;
}

h2{
    text-align:center;
    color:#1b5e20;
}

.box{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    max-width:500px;
    margin:auto;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
    box-sizing:border-box;
}

.orderBox{
    background:#f9f9f9;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.total{
    font-size:20px;
    font-weight:bold;
    color:#1b5e20;
    margin-top:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1b5e20,#43a047);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<h2>🧾 Checkout</h2>

<div class="box">

<input type="text" id="name" placeholder="Your Full Name">
<input type="tel" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<div class="orderBox" id="orderBox"></div>
<div class="total" id="total"></div>

<button onclick="placeOrder()">
Place Order via WhatsApp 📲
</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orderBox = document.getElementById("orderBox");

/* LOAD ORDER */
function loadOrder(){

    orderBox.innerHTML = "";

    if(cart.length === 0){
        orderBox.innerHTML = "<p>Your cart is empty 🛒</p>";
        document.getElementById("total").innerText = "";
        return;
    }

    let total = 0;

    cart.forEach(item=>{

        let qty = item.qty || 1;
        let sub = item.price * qty;

        total += sub;

        orderBox.innerHTML += `
            <p>
                <b>${item.name}</b><br>
                ₦${item.price} × ${qty} = ₦${sub}
            </p>
        `;
    });

    document.getElementById("total").innerText =
        "Total: ₦" + total;
}

/* PLACE ORDER */
function placeOrder(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if(!name || !phone || !address){
        alert("Please fill all fields");
        return;
    }

    // Recalculate total correctly
    let total = 0;
    cart.forEach(item=>{
        total += item.price * (item.qty || 1);
    });

    /* SAVE ORDER (FIXED) */
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.push({
        items: cart,
        total: total,
        status: "Pending",
        date: new Date().toLocaleString()
    });

    localStorage.setItem("orders", JSON.stringify(orders));

    /* WHATSAPP MESSAGE */
    let message = `🌿 NEW ORDER

👤 Name: ${name}
📞 Phone: ${phone}
📍 Address: ${address}

📦 Order Items:
`;

    cart.forEach(item=>{
        message += `- ${item.name}
  ₦${item.price} × ${item.qty || 1}
`;
    });

    message += `

💰 Total: ₦${total}

Thank you for shopping with Bikeh Herbal Therapy Store 🌿`;

    let whatsappURL =
    "https://wa.me/2347044434241?text=" +
    encodeURIComponent(message);

    window.open(whatsappURL, "_blank");
}

loadOrder();

</script>

</body>
</html>
