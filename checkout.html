<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body{
    font-family:Arial;
    background:#f4f6fb;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#1b5e20;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="box">

<h2>Checkout</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Address">

<button onclick="order()">Place Order via WhatsApp</button>

</div>

<script>

function order(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let msg = "Hello, I want to order:%0A";

    cart.forEach(c=>{
        msg += "- " + c.name + " ₦" + c.price + "%0A";
    });

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    msg += "%0AName: " + name + "%0APhone: " + phone;

    window.open("https://wa.me/234XXXXXXXXXX?text=" + msg);

    localStorage.removeItem("cart");
}

</script>

</body>
</html>
