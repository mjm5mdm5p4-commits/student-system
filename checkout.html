<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:400px;
    margin:auto;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    background:#1b5e20;
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="box">

<h2>Checkout</h2>

<input placeholder="Full Name">
<input placeholder="Phone Number">
<input placeholder="Address">

<button onclick="order()">Place Order</button>

</div>

<script>
function order(){
    localStorage.removeItem("cart");
    alert("Order placed successfully!");
    window.location.href = "index.html";
}
</script>

</body>
</html>
