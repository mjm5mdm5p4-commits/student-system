<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Courses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#eef2f7;
    margin:0;
    display:flex;
    justify-content:center;
}

.container{
    width:360px;
    margin-top:50px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1d2671;
}

.course{
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    cursor:pointer;
    text-align:center;
    transition:0.3s;
}

.course:hover{
    background:#1d2671;
    color:white;
}

.selected{
    background:#1d2671;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    background:#1d2671;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#c33764;
}
</style>
</head>

<body>

<div class="container">
<h2>Select Courses</h2>

<div class="course" onclick="toggle(this)">CSC101</div>
<div class="course" onclick="toggle(this)">MTH101</div>
<div class="course" onclick="toggle(this)">GST101</div>
<div class="course" onclick="toggle(this)">PHY101</div>
<div class="course" onclick="toggle(this)">CHM101</div>

<button onclick="submitCourses()">Save Courses</button>
</div>

<script>

let selected = [];

function toggle(el){
    let course = el.innerText;

    el.classList.toggle("selected");

    if(selected.includes(course)){
        selected = selected.filter(c => c !== course);
    }else{
        selected.push(course);
    }
}

function submitCourses(){
    localStorage.setItem("courses", JSON.stringify(selected));

    alert("Courses Saved Successfully!");

    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
