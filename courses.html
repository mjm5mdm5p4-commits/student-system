<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Courses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1d2671;
}

.course{
    padding:14px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    cursor:pointer;
    text-align:center;
    transition:0.3s;
    font-weight:bold;
}

.course:hover{
    background:#1d2671;
    color:white;
}

.selected{
    background:#1d2671;
    color:white;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    background:#1d2671;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#c33764;
}

nav{
    text-align:center;
    margin-bottom:20px;
}

nav a{
    text-decoration:none;
    margin:0 10px;
    color:#1d2671;
    font-weight:bold;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
</nav>

<div class="container">

<h2>Select Courses</h2>

<div class="course" onclick="toggle(this)">CSC101</div>
<div class="course" onclick="toggle(this)">MTH101</div>
<div class="course" onclick="toggle(this)">GST101</div>
<div class="course" onclick="toggle(this)">PHY101</div>
<div class="course" onclick="toggle(this)">CHM101</div>

<button onclick="submitCourses()">Save Courses</button>

</div>

<script>

let selected = [];

function toggle(el){

    let course = el.innerText;

    el.classList.toggle("selected");

    if(selected.includes(course)){
        selected = selected.filter(c => c !== course);
    }else{
        selected.push(course);
    }
}

function submitCourses(){

    alert("Courses Saved Successfully!");

    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
