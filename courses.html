<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Courses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
}

.container{
    width:350px;
    margin-top:60px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.course{
    display:block;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    cursor:pointer;
    text-align:center;
    transition:0.3s;
}

.course:hover{
    background:#1d2671;
    color:white;
}

.course.selected{
    background:#1d2671;
    color:white;
}

.bottom-btn{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    background:#1d2671;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.bottom-btn:hover{
    background:#c33764;
}
</style>
</head>

<body>

<div class="container">
<h2>Select Courses</h2>

<div class="course" onclick="toggle(this)">CSC101</div>
<div class="course" onclick="toggle(this)">MTH101</div>
<div class="course" onclick="toggle(this)">GST101</div>
<div class="course" onclick="toggle(this)">PHY101</div>

<button class="bottom-btn" onclick="submitCourses()">
Submit Courses
</button>
</div>

<script>

function toggle(el){
    el.classList.toggle("selected");
}

function submitCourses(){
    alert("Courses Registered Successfully!");
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
