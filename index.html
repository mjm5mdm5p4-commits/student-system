<!DOCTYPE html>
<html>
<head>
<title>Herbal Wellness Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6fb;
}

header{
    background:#1b5e20;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
    background:#1b5e20;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Herbal Wellness Store 🌿</h1>
<p>Natural wellness products for daily care</p>
</header>

<div class="container">

<div class="card">
<h3>Herbal Tea Blend</h3>
<p>Natural herbal mix for daily wellness support</p>
<button onclick="add('Herbal Tea Blend')">Add to Cart</button>
</div>

<div class="card">
<h3>Detox Leaf Mix 🍃</h3>
<p>Carefully selected natural leaves</p>
<button onclick="add('Detox Leaf Mix')">Add to Cart</button>
</div>

<div class="card">
<h3>Herbal Cleanse Flusher</h3>
<p>Natural cleansing herbal formula</p>
<button onclick="add('Herbal Cleanse Flusher')">Add to Cart</button>
</div>

<br>

<a href="cart.html">Go to Cart 🛒</a>

</div>

<script>
function add(item){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push(item);
    localStorage.setItem("cart", JSON.stringify(cart));
    alert(item + " added to cart");
}
</script>

</body>
</html>
