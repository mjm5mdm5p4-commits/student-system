<!DOCTYPE html>
<html>
<head>
<title>Bikeh Herbal Therapy Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f7fb;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#1b5e20,#43a047);
    color:white;
    padding:40px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:28px;
}

header p{
    margin-top:10px;
    opacity:0.9;
}

/* NAV */
nav a{
    color:white;
    text-decoration:none;
    margin:10px;
    font-weight:bold;
}

/* HERO */
.hero{
    text-align:center;
    padding:20px;
    font-size:18px;
    color:#333;
}

/* GRID */
.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
}

/* IMAGE */
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:10px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    background:#1b5e20;
    color:white;
    border-radius:8px;
}

.price{
    color:#1b5e20;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>🌿 BIKEH HERBAL THERAPY STORE</h1>
<p>Your natural path to balance, wellness & vitality</p>

<nav>
<a href="index.html">Home</a>
<a href="cart.html">Cart 🛒</a>
<a href="checkout.html">Checkout</a>
<a href="admin.html">Admin</a>
</nav>

</header>

<div class="hero">
Welcome to our herbal wellness store 🌿
</div>

<div class="container">
<div class="grid" id="productBox"></div>
</div>

<!-- LOAD STORE DATA FIRST -->
<script src="store.js"></script>

<script>

function loadProducts(){

    let box = document.getElementById("productBox");
    box.innerHTML = "";

    if(!products || products.length === 0){
        box.innerHTML = "<p>No products available yet.</p>";
        return;
    }

    products.forEach(p=>{

        box.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p class="price">₦${p.price}</p>
            <p style="font-size:13px;color:#555;">
                ${p.description || ""}
            </p>

            <button onclick="addToCart(${p.id})">
                Add to Cart
            </button>
        </div>
        `;
    });
}

function addToCart(id){

    let item = products.find(p => p.id === id);

    let existing = cart.find(c => c.id === id);

    if(existing){
        existing.qty += 1;
    } else {
        cart.push({...item, qty: 1});
    }

    saveCart();
    alert("Added to cart ✅");
}

loadProducts();

</script>

</body>
</html>
