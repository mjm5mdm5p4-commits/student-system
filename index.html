<!DOCTYPE html>
<html>
<head>
<title>Student Portal Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d2671,#c33764);
}

.box{
    background:white;
    padding:25px;
    width:320px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#1d2671;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#c33764;
}
</style>
</head>

<body>

<div class="box">
<h2>Student Login</h2>

<input id="matric" placeholder="Matric Number">
<input id="name" placeholder="Full Name">

<button onclick="login()">Login</button>
</div>

<script>
function login(){
    let matric = document.getElementById("matric").value;
    let name = document.getElementById("name").value;

    if(matric === "" || name === ""){
        alert("Fill all fields");
        return;
    }

    localStorage.setItem("matric", matric);
    localStorage.setItem("name", name);

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
