<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>University Portal Login</title>

<script src="students.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d2671,#c33764);
}

.box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#1d2671;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.error{
    color:red;
}

</style>
</head>

<body>

<div class="box">

<h2>University Login</h2>

<input id="matric" placeholder="Enter Matric Number">

<button onclick="login()">Login</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

    let matric = document.getElementById("matric").value;

    let student = students.find(s => s.matric === matric);

    if(!student){
        document.getElementById("error").innerText = "Student not found!";
        return;
    }

    localStorage.setItem("student", JSON.stringify(student));

    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
