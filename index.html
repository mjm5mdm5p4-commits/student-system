<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d2671,#c33764);
}

.box{
    background:white;
    width:320px;
    padding:30px;
    border-radius:12px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#1d2671;
    color:white;
    border:none;
}

.error{
    color:red;
    text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="matric" placeholder="Matric Number">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

    let userData = localStorage.getItem("user");

    if(!userData){
        document.getElementById("error").innerText = "No account found. Please register first.";
        return;
    }

    let user = JSON.parse(userData);

    let matric = document.getElementById("matric").value;
    let password = document.getElementById("password").value;

    if(matric === user.matric && password === user.password){

        localStorage.setItem("loggedIn","true");

        window.location.href = "dashboard.html";

    }else{
        document.getElementById("error").innerText = "Wrong login details";
    }
}

</script>

</body>
</html>
