<!DOCTYPE html>
<html>
<head>
<title>Bikeh Herbal Therapy Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f7fb;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#1b5e20,#43a047);
    color:white;
    padding:50px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:30px;
}

header p{
    margin-top:10px;
    opacity:0.9;
}

/* NAV */
nav{
    margin-top:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:10px;
    font-weight:bold;
}

/* HERO */
.hero{
    text-align:center;
    padding:25px;
    font-size:18px;
    color:#333;
}

/* SEARCH */
#search{
    width:100%;
    padding:12px;
    margin:15px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

/* CONTAINER */
.container{
    padding:20px;
    max-width:1100px;
    margin:auto;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* IMAGE */
.card img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:10px;
}

/* TITLE */
.card h3{
    margin:10px 0 5px;
}

/* PRICE */
.price{
    color:#1b5e20;
    font-weight:bold;
    font-size:16px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    background:#1b5e20;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

</style>
</head>

<body>

<header>
<h1>🌿 BIKEH HERBAL THERAPY STORE</h1>
<p>Your natural path to balance, wellness & vitality</p>

<nav>
<a href="index.html">Home</a>
<a href="cart.html">Cart 🛒</a>
<a href="checkout.html">Checkout</a>
<a href="admin.html">Admin</a>
</nav>
</header>

<div class="hero">
Welcome 👋 Discover natural herbal solutions for everyday wellness
</div>

<div class="container">

<input type="text" id="search" placeholder="Search products 🔍">

<div class="grid" id="productBox"></div>

</div>

<script src="store.js"></script>

<script>

let currentSearch = "";

/* SEARCH */
document.getElementById("search").addEventListener("input", function(e){
    currentSearch = e.target.value.toLowerCase();
    loadProducts();
});

/* LOAD PRODUCTS */
function loadProducts(){

    let box = document.getElementById("productBox");
    box.innerHTML = "";

    let filtered = products.filter(p =>
        p.name.toLowerCase().includes(currentSearch)
    );

    if(filtered.length === 0){
        box.innerHTML = "<p>No products found 🔍</p>";
        return;
    }

    filtered.forEach(p=>{
        box.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p class="price">₦${p.price}</p>
            <button onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
        `;
    });
}

/* ADD TO CART */
function addToCart(id){

    let item = products.find(p => p.id === id);

    let existing = cart.find(c => c.id === id);

    if(existing){
        existing.qty += 1;
    } else {
        cart.push({...item, qty: 1});
    }

    saveCart();
    alert("Added to cart ✅");
}

/* LIVE UPDATE */
function startLiveUpdate(){
    setInterval(()=>{
        loadProducts();
    }, 2000);
}

loadProducts();
startLiveUpdate();

</script>

</body>
</html>
