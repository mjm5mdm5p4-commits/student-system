<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d2671,#c33764);
}

.box{
    background:white;
    width:320px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#1d2671;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#1d2671;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#c33764;
}

.error{
    color:red;
    text-align:center;
    font-size:14px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>Student Login</h2>

<input type="text" id="matric" placeholder="Matric Number">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

    let matric = document.getElementById("matric").value;
    let password = document.getElementById("password").value;

    let savedMatric = localStorage.getItem("matric");
    let savedPassword = localStorage.getItem("password");

    // check if user exists
    if(!savedMatric || !savedPassword){
        document.getElementById("error").innerText =
        "No registered user found. Please register first.";
        return;
    }

    // login check
    if(matric === savedMatric && password === savedPassword){

        localStorage.setItem("loggedIn","true");

        window.location.href = "dashboard.html";

    }else{

        document.getElementById("error").innerText =
        "Invalid matric number or password";

    }
}

</script>

</body>
</html>
